<!DOCTYPE html><html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Người Chơi — Cờ Dân Chủ</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#C0392B;--red2:#E74C3C;--rg:rgba(192,57,43,.4);--gold:#D4A017;--gold2:#F1C40F;--gg:rgba(212,160,23,.35);--ink:#07040A;--ink2:#110D18;--pp:#F5F0FF;--gr:#1A5C2A;--gr2:#2ECC71;--bl:#1A3A6A;--bl2:#3498DB;--pu:#4A1478;--pu2:#9B59B6;--or:#7A3000;--or2:#E67E22;--cy:#006655;--cy2:#1ABC9C}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);font-family:'Be Vietnam Pro',sans-serif;color:var(--pp)}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(212,160,23,.2);border-radius:2px}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flagWave{0%{d:path("M0,0 Q30,5 60,0 Q90,-5 120,0 L120,80 Q90,85 60,80 Q30,75 0,80 Z")}50%{d:path("M0,0 Q30,8 60,-3 Q90,-10 120,0 L120,80 Q90,90 60,77 Q30,70 0,80 Z")}100%{d:path("M0,0 Q30,5 60,0 Q90,-5 120,0 L120,80 Q90,85 60,80 Q30,75 0,80 Z")}}
@keyframes starGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(255,220,0,.9))}50%{filter:drop-shadow(0 0 14px rgba(255,220,0,1))}}
@keyframes jailBarAnim{0%,100%{opacity:.4}50%{opacity:.8}}
.vn-flag-wrap{display:inline-flex;align-items:flex-start}
.vn-pole{background:linear-gradient(180deg,#FFE066,#9A7000 40%,#FFE066 80%,#9A7000);border-radius:2px;box-shadow:2px 0 6px rgba(0,0,0,.6)}
.vn-flag-svg{display:block;overflow:visible}
.vn-flag-body{animation:flagWave 2.2s ease-in-out infinite;transform-origin:left center}
.vn-star{fill:#FFE033;animation:starGlow 2.5s ease-in-out infinite}
/* JOIN */
#s-join{background:radial-gradient(ellipse 200% 100% at 50% -10%,rgba(192,57,43,.18),transparent 55%),var(--ink);overflow-y:auto;padding:20px}
.jbox{max-width:420px;width:100%}
.jtitle{font-family:'Dela Gothic One',sans-serif;font-size:clamp(36px,10vw,64px);background:linear-gradient(145deg,#FFF9C4,#F1C40F 35%,#D4A017 55%,#E74C3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.jsub{font-size:11px;font-weight:700;color:rgba(245,240,255,.35);letter-spacing:2px;margin-bottom:20px;text-align:center}
.card{background:linear-gradient(155deg,rgba(20,12,30,.98),rgba(10,5,18,.99));border:1px solid rgba(212,160,23,.15);border-radius:18px;padding:20px 18px;box-shadow:0 30px 80px rgba(0,0,0,.9);position:relative;overflow:hidden;margin-bottom:12px}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,160,23,.6),rgba(192,57,43,.5),rgba(212,160,23,.6),transparent)}
.lbl{font-size:8.5px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(212,160,23,.38);margin-bottom:8px}
.inp{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(212,160,23,.12);border-radius:11px;color:var(--pp);font-family:'Be Vietnam Pro',sans-serif;font-size:15px;font-weight:700;outline:none;transition:border-color .2s;margin-bottom:12px;-webkit-appearance:none}
.inp:focus{border-color:rgba(212,160,23,.38)}
.inp-code{font-family:'Dela Gothic One',sans-serif;font-size:26px;text-align:center;letter-spacing:10px}
.btn-main{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,var(--red2),var(--red));color:var(--gold2);font-family:'Dela Gothic One',sans-serif;font-size:16px;letter-spacing:2px;box-shadow:0 8px 30px var(--rg);transition:all .28s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.btn-main:hover{transform:translateY(-2px)}
.btn-main:disabled{opacity:.3;cursor:not-allowed;transform:none}
.err{color:#FF8080;font-size:11px;font-weight:700;text-align:center;margin-bottom:10px;min-height:18px}
.em-grid{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px}
.em-btn{width:43px;height:43px;border-radius:10px;border:2px solid rgba(212,160,23,.1);background:rgba(212,160,23,.04);font-size:21px;transition:all .15s}
.em-btn.sel{background:rgba(192,57,43,.22);border-color:var(--red2);transform:scale(1.15);box-shadow:0 0 18px var(--rg)}
/* WAIT */
.dot-pulse{width:8px;height:8px;border-radius:50%;background:var(--gr2);animation:pulse 1.4s ease-in-out infinite}
.join-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin:10px 0}
.join-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:8px 6px;text-align:center}
.join-card.me{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.2)}
/* HUD */
.hud{height:46px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(10,5,16,.98);border-bottom:1.5px solid rgba(212,160,23,.12);z-index:20}
.hud-brand{font-family:'Dela Gothic One',sans-serif;font-size:13px;background:linear-gradient(90deg,#F1C40F,#E74C3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hud-pill{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px;background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.25);color:var(--gold2)}
/* PLAYER VIEW */
#s-player{background:var(--ink);flex-direction:column;overflow:hidden}
.pv-me{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(12,7,20,.98);border-bottom:1px solid rgba(212,160,23,.07)}
.pv-av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid rgba(255,255,255,.25);flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.pv-turn{flex-shrink:0;padding:6px 10px;text-align:center;font-size:11px;font-weight:600;border-bottom:1px solid rgba(212,160,23,.06);transition:all .3s}
.pv-board-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px}
.pv-scores{flex-shrink:0;background:rgba(10,6,18,.98);border-top:1px solid rgba(212,160,23,.06);padding:7px 10px;overflow-x:auto;display:flex;gap:6px;max-height:100px}
.pv-score-card{flex-shrink:0;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:9px;padding:5px 8px;text-align:center;min-width:64px}
.pv-score-card.me{background:rgba(212,160,23,.08);border-color:rgba(212,160,23,.18)}
/* BOARD */
.board-grid-pv{position:absolute;inset:0;display:grid;grid-template-columns:repeat(11,1fr);grid-template-rows:repeat(11,1fr)}
.cell{position:relative;border:1px solid rgba(212,160,23,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:rgba(12,7,20,.93);padding:1px}
.cband{position:absolute;border-radius:1px}
.cell.bot .cband{bottom:0;left:0;right:0;height:21%}
.cell.top .cband{top:0;left:0;right:0;height:21%}
.cell.lft .cband{right:0;top:0;bottom:0;width:21%}
.cell.rgt .cband{left:0;top:0;bottom:0;width:21%}
.band-r{background:linear-gradient(#E74C3C,#C0392B)}.band-g{background:linear-gradient(#A07810,#F1C40F)}.band-gr{background:linear-gradient(#1A5C2A,#2ECC71)}.band-bl{background:linear-gradient(#1A3A6A,#3498DB)}.band-pu{background:linear-gradient(#4A1478,#9B59B6)}.band-or{background:linear-gradient(#7A3000,#E67E22)}.band-cy{background:linear-gradient(#006655,#1ABC9C)}
.c-icon{font-size:clamp(6px,1.3vw,14px);line-height:1;margin-bottom:1px;position:relative;z-index:2}
.c-name{font-size:clamp(4px,.55vw,7px);font-weight:700;color:rgba(245,240,255,.82);text-align:center;line-height:1.2;padding:0 1px;max-height:2.8em;overflow:hidden;position:relative;z-index:2}
.cell-start{background:linear-gradient(135deg,rgba(100,0,0,.5),rgba(192,57,43,.3))!important;border:2px solid rgba(192,57,43,.55)!important}
.cell-reform{background:linear-gradient(135deg,rgba(74,20,120,.55),rgba(30,0,60,.45))!important;border:2px solid rgba(155,89,182,.5)!important}
.cell-park{background:linear-gradient(135deg,rgba(26,92,42,.4),rgba(10,50,25,.35))!important;border:2px solid rgba(46,204,113,.4)!important}
.cell-go-jail{background:linear-gradient(135deg,rgba(74,20,120,.35),rgba(192,57,43,.3))!important;border:2px solid rgba(155,89,182,.4)!important}
.cell-lucky{background:rgba(160,120,16,.12)!important;border:1px solid rgba(212,160,23,.32)!important}
.cell-duel{background:rgba(30,80,150,.1)!important;border:1px solid rgba(52,152,219,.28)!important}
.cell-q{background:rgba(212,160,23,.05)!important}
.cell-nq{background:rgba(0,50,15,.25)!important}
.cell-dn{background:rgba(50,24,0,.22)!important}
.cell-tax{background:rgba(74,20,120,.12)!important}
.cell-bon{background:rgba(26,92,42,.14)!important}
.cell-mini{background:rgba(30,80,150,.09)!important;border-color:rgba(52,152,219,.2)!important}
.jail-bars{position:absolute;inset:0;display:flex;gap:2px;align-items:center;justify-content:center;pointer-events:none;z-index:1}
.jail-bar{width:2px;border-radius:1px;background:rgba(155,89,182,.6);animation:jailBarAnim 2.2s ease-in-out infinite}
.cell-tokens{position:absolute;bottom:1px;right:1px;display:flex;flex-wrap:wrap;gap:1px;z-index:4;max-width:85%;pointer-events:none}
.token-dot{border-radius:2px;padding:1px;font-size:clamp(4px,.7vw,8px);line-height:1}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%) translateY(-12px);background:rgba(7,4,10,.97);border:1px solid var(--gold);padding:9px 20px;border-radius:11px;z-index:500;font-size:12px;font-weight:700;color:var(--gold2);box-shadow:0 6px 24px rgba(0,0,0,.8);opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head><body>
<div class="toast" id="toast"></div>

<!-- JOIN -->
<div class="screen active" id="s-join">
<div class="jbox">
  <div style="text-align:center;margin-bottom:12px" id="flag-join"></div>
  <div class="jtitle">CỜ DÂN CHỦ</div>
  <div class="jsub">NGƯỜI CHƠI · CNXHKH CH.4</div>
  <div class="card" id="pB">
    <div class="err" id="err-b"></div>
    <div class="lbl">CHỌN AVATAR</div>
    <div class="em-grid" id="em-grid"></div>
    <div class="lbl">MÃ PHÒNG</div>
    <input class="inp inp-code" id="inp-room" maxlength="6" placeholder="ABC123" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
    <div class="lbl">TÊN CỦA BẠN</div>
    <input class="inp" id="inp-name" maxlength="20" placeholder="Nhập tên...">
    <button class="btn-main" onclick="joinGame()">🎮 VÀO CHƠI!</button>
  </div>
  <!-- Wait -->
  <div class="card" id="pD" style="display:none;text-align:center">
    <div style="font-size:56px;margin-bottom:8px" id="w-av">🎮</div>
    <div style="font-family:'Dela Gothic One',sans-serif;font-size:20px;color:var(--gold2);margin-bottom:4px" id="w-name">Xin chào!</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px">
      <div class="dot-pulse"></div>
      <div style="font-size:12px;color:rgba(245,240,255,.45)">Phòng: <span id="w-room" style="color:var(--gold2);font-weight:700"></span> — Chờ Admin bắt đầu...</div>
    </div>
    <div id="w-players" class="join-grid"></div>
  </div>
</div>
</div>

<!-- PLAYER VIEW -->
<div class="screen" id="s-player">
  <div class="hud">
    <div style="display:flex;align-items:center;gap:8px">
      <div id="flag-pv"></div>
      <div class="hud-brand">CỜ DÂN CHỦ</div>
    </div>
    <div class="hud-pill" id="pv-rnd">Vòng 1/5</div>
  </div>
  <div class="pv-me">
    <div class="pv-av" id="pv-av"></div>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:800;color:var(--pp)" id="pv-name"></div>
      <div style="font-size:9px;color:rgba(245,240,255,.38)" id="pv-cell"></div>
    </div>
    <div style="text-align:right">
      <div style="font-family:'Dela Gothic One',sans-serif;font-size:26px;color:#F1C40F" id="pv-score">10</div>
      <div style="font-size:7px;letter-spacing:1px;color:rgba(212,160,23,.3)">ĐIỂM</div>
    </div>
    <div id="pv-jail-badge" style="display:none;background:rgba(74,20,120,.2);border:1px solid rgba(155,89,182,.3);border-radius:9px;padding:5px 9px;font-size:9px;color:#CC88FF;text-align:center;margin-left:8px">⛔ CẢI TẠO<br><span id="pv-jail-turns">1 lượt</span></div>
  </div>
  <div class="pv-turn" id="pv-turn"><span id="pv-turn-txt">Đang chờ...</span></div>
  <div class="pv-board-wrap">
    <div style="position:relative;width:min(calc(100vw - 4px),calc(100vh - 180px),560px);height:min(calc(100vw - 4px),calc(100vh - 180px),560px)">
      <div class="board-grid-pv" id="pv-grid"></div>
      <div style="position:absolute;top:calc(100%/11);left:calc(100%/11);right:calc(100%/11);bottom:calc(100%/11);display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse,rgba(28,10,50,.97),rgba(7,4,11,.99));border:1px solid rgba(212,160,23,.1);border-radius:4px;gap:2px;overflow:hidden;padding:3px">
        <div id="pv-center-flag" style="flex-shrink:0"></div>
        <div style="font-family:'Dela Gothic One',sans-serif;font-size:clamp(8px,2.2vw,18px);background:linear-gradient(135deg,#FFF9C4,#F1C40F,#E74C3C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1;letter-spacing:.5px">CỜ DÂN CHỦ</div>
        <div style="font-size:clamp(4px,1vw,8px);font-weight:700;color:rgba(212,160,23,.35);letter-spacing:.5px;text-align:center">DÂN CHỦ XHCN</div>
        <div id="pv-dice-row" style="display:flex;gap:3px"></div>
      </div>
    </div>
  </div>
  <div class="pv-scores" id="pv-scores"></div>
</div>

<script>
const $=id=>document.getElementById(id);
const API='/api/game';
const post=(action,body)=>fetch(`${API}?action=${action}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
const getR=(action,params)=>fetch(`${API}?action=${action}&${new URLSearchParams(params)}`).then(r=>r.json());
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

const PAL=[{bg:'#6B0000',bd:'#FF5555',em:'🔴'},{bg:'#003580',bd:'#4488FF',em:'🔵'},{bg:'#0A3A18',bd:'#33DD77',em:'🟢'},{bg:'#3A0A6A',bd:'#BB55FF',em:'🟣'},{bg:'#6A2800',bd:'#FF8833',em:'🟠'},{bg:'#1E1E2E',bd:'#8899CC',em:'⚫'},{bg:'#1E3A00',bd:'#AAFF44',em:'🟡'},{bg:'#001E3A',bd:'#44FFEE',em:'🔷'},{bg:'#2A001E',bd:'#FF66CC',em:'💗'},{bg:'#1A1A00',bd:'#DDDD00',em:'⭐'}];
const FACES=['⚀','⚁','⚂','⚃','⚄','⚅'];
const EMOJIS=['🔴','🔵','🟢','🟣','🟠','⚫','🦊','🐯','🦁','🐼','🦅','🌟','⚡','🔥','💎','🎯'];
const CELLS=[['start','🏁','KHAI MẠC','','','cell-start'],['q','⭐','Đảng Ủy Xã','','band-r','cell-q'],['nq','📋','Nghị Quyết','','band-r','cell-nq'],['q','🏛️','UBND Xã','','band-r','cell-q'],['tax','💸','Đóng Góp','','','cell-tax'],['q','🗳️','Điểm Bầu Cử','','band-g','cell-q'],['lucky','🎰','VÒNG QUAY','','','cell-lucky'],['q','📜','Hiến Pháp 2013','','band-g','cell-q'],['mini','🎮','Mini Game','','','cell-mini'],['q','🤝','MTTQ','','band-g','cell-q'],['reform','🏛️','CẢI TẠO\nTƯ TƯỞNG','','','cell-reform'],['q','👥','Hội Đồng Dân','','band-gr','cell-q'],['mini','🎮','Mini Game','','','cell-mini'],['q','🔍','Ban Thanh Tra','','band-gr','cell-q'],['nq','📋','Nghị Quyết','','band-gr','cell-nq'],['q','📬','Tiếp Dân','','band-bl','cell-q'],['mini','🎮','Mini Game','','','cell-mini'],['q','💰','Ngân Sách CK','','band-bl','cell-q'],['duel','⚔️','THÁCH ĐẤU','','','cell-duel'],['q','📐','Quy Hoạch Đất','','band-bl','cell-q'],['park','🌿','CÔNG VIÊN','','','cell-park'],['q','⭐','Chi Bộ Đảng','','band-pu','cell-q'],['nq','📋','Nghị Quyết','','band-pu','cell-nq'],['mini','🎮','Mini Game','','','cell-mini'],['tax','💸','Nộp Phạt QC','','','cell-tax'],['q','🏥','Trạm Y Tế','','band-or','cell-q'],['bon','🎁','Thưởng CĐ','','','cell-bon'],['q','🌿','Hương Ước Thôn','','band-or','cell-q'],['dn','📣','Dân Nguyện','','band-or','cell-dn'],['q','📱','Cổng TT Điện Tử','','band-or','cell-q'],['go-jail','⚠️','ĐI CẢI TẠO!','','','cell-go-jail'],['q','🔍','Giám Sát ND','','band-cy','cell-q'],['mini','🎮','Mini Game','','','cell-mini'],['q','⭐','Đảng Lãnh Đạo','','band-cy','cell-q'],['nq','📋','Nghị Quyết','','band-cy','cell-nq'],['q','👥','Nhân Dân Làm Chủ','','band-r','cell-q'],['dn','📣','Dân Nguyện','','band-r','cell-dn'],['q','🏛️','Pháp Quyền XHCN','','band-r','cell-q'],['mini','🎮','Mini Game','','','cell-mini'],['q','🎯','Đích DC Cơ Sở','','','cell-q']];
const getP=p=>PAL[(p?.pi||0)%PAL.length];

let myId='',myRoom='',G={},selEm=EMOJIS[0],_pollTs=0;

function buildFlag(s){const pw=Math.round(2.5*s),fh=Math.round(56*s),fw=Math.round(84*s);return`<div class="vn-flag-wrap"><div style="width:${pw}px;height:${fh}px" class="vn-pole"></div><svg class="vn-flag-svg" width="${fw}" height="${fh}" viewBox="0 0 120 80"><defs><clipPath id="fc${s}"><path class="vn-flag-body" d="M0,0 Q30,5 60,0 Q90,-5 120,0 L120,80 Q90,85 60,80 Q30,75 0,80 Z"/></clipPath></defs><path class="vn-flag-body" d="M0,0 Q30,5 60,0 Q90,-5 120,0 L120,80 Q90,85 60,80 Q30,75 0,80 Z" fill="#D42B2B"/><polygon class="vn-star" points="60,10 64.7,23.6 79,23.6 67.6,31.4 72.4,45 60,37.2 47.6,45 52.4,31.4 41,23.6 55.3,23.6" clip-path="url(#fc${s})"/></svg></div>`;}
$('flag-join').innerHTML=buildFlag(1.6);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active')}

// EMOJIS
const eg=$('em-grid');
EMOJIS.forEach(em=>{const b=document.createElement('button');b.className='em-btn'+(em===EMOJIS[0]?' sel':'');b.textContent=em;b.onclick=()=>{selEm=em;document.querySelectorAll('.em-btn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel')};eg.appendChild(b)});

// JOIN
async function joinGame(){
  const room=$('inp-room').value.trim().toUpperCase();
  const name=$('inp-name').value.trim();
  if(room.length<4){showErr('err-b','Nhập mã phòng đúng (6 ký tự)!');return}
  if(!name){showErr('err-b','Nhập tên của bạn!');return}
  myId='p_'+Math.random().toString(36).slice(2,8);
  myRoom=room;
  const pi=Math.floor(Math.random()*PAL.length);
  const r=await post('join',{code:room,id:myId,name,emoji:selEm,pi});
  if(!r.ok){showErr('err-b',r.err||'Lỗi!');return}
  G=r.state;_pollTs=G.ts||0;
  $('w-av').textContent=selEm;$('w-name').textContent=`Xin chào, ${name}!`;$('w-room').textContent=room;
  $('pB').style.display='none';$('pD').style.display='block';
  startPoll();
}
function showErr(id,msg){const e=$(id);e.textContent=msg;setTimeout(()=>e.textContent='',3500)}

// POLL
let _pollActive=false;
async function startPoll(){
  if(_pollActive)return;_pollActive=true;
  while(true){
    try{
      const r=await getR('poll',{code:myRoom,ts:_pollTs});
      if(r.ok&&r.state){
        G=r.state;_pollTs=G.ts||_pollTs;
        if(G.phase==='lobby'){handleLobby(G);}
        else if(G.phase==='playing'){
          if(!$('s-player').classList.contains('active')){showScreen('s-player');buildPVBoard();}
          renderPlayer(G);
        } else if(G.phase==='ended'){_pollActive=false;showEndMsg();return;}
      }
    }catch(e){}
    await sleep(200);
  }
}

function handleLobby(s){
  $('w-players').innerHTML=(s.order||[]).map(pid=>{const p=s.players?.[pid];if(!p)return'';const isMe=pid===myId;return`<div class="join-card${isMe?' me':''}"><div style="font-size:20px;margin-bottom:2px">${p.emoji}</div><div style="font-size:9.5px;font-weight:700">${p.name}${isMe?' (bạn)':''}</div></div>`}).join('');
}

// BUILD PV BOARD
let pvBuilt=false;
function buildPVBoard(){
  if(pvBuilt)return;pvBuilt=true;
  // Render animated flag in center
  const cf=$('pv-center-flag');
  if(cf){const boardSz=cf.closest('[style*="min("]')?.offsetWidth||300;const fs=Math.max(0.4,boardSz/560);const pw=Math.round(2.5*fs),fh=Math.round(44*fs),fw=Math.round(66*fs);cf.innerHTML=`<div class="vn-flag-wrap"><div style="width:${pw}px;height:${fh}px" class="vn-pole"></div><svg class="vn-flag-svg" width="${fw}" height="${fh}" viewBox="0 0 120 80"><defs><clipPath id="pvcf"><path class="vn-flag-body" d="M0,0 Q30,5 60,0 Q90,-5 120,0 L120,80 Q90,85 60,80 Q30,75 0,80 Z"/></clipPath></defs><path class="vn-flag-body" d="M0,0 Q30,5 60,0 Q90,-5 120,0 L120,80 Q90,85 60,80 Q30,75 0,80 Z" fill="#D42B2B"/><polygon class="vn-star" points="60,10 64.7,23.6 79,23.6 67.6,31.4 72.4,45 60,37.2 47.6,45 52.4,31.4 41,23.6 55.3,23.6" clip-path="url(#pvcf)"/></svg></div>`;}
  const pg=$('pv-grid');if(!pg||pg.children.length)return;
  function cellPos(i){if(i<11)return{r:10,c:10-i};if(i<21)return{r:10-(i-10),c:0};if(i<31)return{r:0,c:i-20};return{r:i-30,c:10}}
  for(let r=0;r<11;r++){for(let c=0;c<11;c++){
    const isEdge=r===0||r===10||c===0||c===10;
    const div=document.createElement('div');div.style.gridRow=r+1;div.style.gridColumn=c+1;
    if(!isEdge){pg.appendChild(div);continue}
    let ci=-1;for(let i=0;i<40;i++){const p=cellPos(i);if(p.r===r&&p.c===c){ci=i;break}}
    if(ci<0){div.style.visibility='hidden';pg.appendChild(div);continue}
    const cd=CELLS[ci];
    const side=r===10&&c!==0&&c!==10?'bot':r===0&&c!==0&&c!==10?'top':c===0&&r!==0&&r!==10?'lft':'rgt';
    div.className=`cell ${cd[5]||''} ${side}`;div.id=`pvc${ci}`;
    if(cd[0]==='reform')div.innerHTML=`<div class="jail-bars">${Array.from({length:7},()=>`<div class="jail-bar" style="height:${40+Math.random()*45}%"></div>`).join('')}</div>`;
    div.innerHTML+=(cd[4]?`<div class="cband ${cd[4]}"></div>`:'')+`<div class="c-icon">${cd[1]}</div><div class="c-name">${cd[2]}</div>`;
    pg.appendChild(div);
  }}
}

function renderPlayer(s){
  const ord=s.order||[];const me=s.players?.[myId];if(!me)return;
  const pal=getP(me);
  $('pv-av').textContent=me.emoji;$('pv-av').style.background=pal.bg;$('pv-av').style.borderColor=pal.bd;
  $('pv-name').textContent=me.name;$('pv-score').textContent=me.score;
  $('pv-rnd').textContent=`Vòng ${s.round}/${s.maxR}`;
  $('pv-cell').textContent=`Ô ${me.pos}: ${CELLS[me.pos][1]} ${CELLS[me.pos][2]}`;
  $('pv-jail-badge').style.display=me.jailTurns>0?'block':'none';
  if(me.jailTurns>0)$('pv-jail-turns').textContent=`${me.jailTurns} lượt`;
  const curPid=ord[s.turn];const isMyTurn=curPid===myId;const curP=s.players?.[curPid];
  const tb=$('pv-turn');const tt=$('pv-turn-txt');
  if(isMyTurn){tt.textContent='⚡ LƯỢT CỦA BẠN — Chờ Admin tung!';tb.style.cssText='background:rgba(46,204,113,.08);border-bottom:1px solid rgba(46,204,113,.15);color:#33EE77;font-weight:800;animation:pulse .9s infinite'}
  else{tt.textContent=curP?`Lượt: ${curP.emoji} ${curP.name}...`:'Đang chờ...';tb.style.cssText='background:transparent;border-bottom:1px solid rgba(212,160,23,.06);color:rgba(245,240,255,.38);animation:none'}
  if(s.dice)$('pv-dice-row').innerHTML=s.dice.map(d=>`<div style="background:linear-gradient(145deg,#FFF8E0,#EDD090);border:2px solid #D4A017;border-radius:6px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;box-shadow:2px 2px 0 rgba(0,0,0,.4)">${FACES[d-1]}</div>`).join('');
  else $('pv-dice-row').innerHTML='';
  const maxSc=Math.max(...ord.map(pid=>s.players[pid]?.score||0),1);
  $('pv-scores').innerHTML=ord.map(pid=>{const p=s.players?.[pid];if(!p)return'';const pal2=getP(p);const isMe=pid===myId;return`<div class="pv-score-card${isMe?' me':''}"><div style="font-size:18px;margin-bottom:1px">${p.emoji}</div><div style="font-size:9px;font-weight:700;color:var(--pp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px">${p.name}</div><div style="font-family:'Dela Gothic One',sans-serif;font-size:13px;color:${pal2.bd}">${p.score}</div></div>`}).join('');
  document.querySelectorAll('#pv-grid .cell-tokens').forEach(t=>t.remove());
  ord.forEach((pid,pi)=>{const p=s.players[pid];if(!p)return;const cel=document.getElementById(`pvc${p.pos}`);if(!cel)return;let tok=cel.querySelector('.cell-tokens');if(!tok){tok=document.createElement('div');tok.className='cell-tokens';cel.appendChild(tok)}const pal2=getP(p);const isCur=pi===s.turn;const d=document.createElement('div');d.className='token-dot';d.style.cssText=`background:${pal2.bg};border:1px solid ${pal2.bd};${pid===myId?'box-shadow:0 0 5px white':''}`;d.textContent=p.emoji;tok.appendChild(d);});
}

function showEndMsg(){
  const s=G;const ord=s.order||[];const sorted=[...ord].sort((a,b)=>(s.players[b]?.score||0)-(s.players[a]?.score||0));
  const winner=s.players[sorted[0]];const me=s.players[myId];const myRank=sorted.indexOf(myId)+1;
  toast(`🏆 Kết thúc! ${winner?.emoji} ${winner?.name} thắng! Bạn hạng ${myRank}/${sorted.length}`);
}
</script>
